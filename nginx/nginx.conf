events {
    worker_connections 1024;
}

http {
    # ── Basics ────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # ── Rate Limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=search:10m rate=10r/s;

    # ── Logging ───────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time": "$time_iso8601",'
            '"remote_addr": "$remote_addr",'
            '"method": "$request_method",'
            '"uri": "$request_uri",'
            '"status": $status,'
            '"body_bytes": $body_bytes_sent,'
            '"request_time": $request_time,'
            '"upstream_time": "$upstream_response_time",'
            '"user_agent": "$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream ──────────────────────────────────────────────
    upstream life_graph_api {
        server app:8000;
    }

    # MCP upstream resolved at runtime (so nginx starts even if mcp is down)

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS (when SSL is ready)
        # Uncomment after obtaining certs:
        # return 301 https://$host$request_uri;

        # ── Without SSL (initial setup) ──────────────────────
        # Remove this block after enabling SSL redirect above

        # Health check (no rate limit)
        location /health {
            proxy_pass http://life_graph_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Brain Viewer dashboard
        location /brain {
            proxy_pass http://life_graph_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            expires 1h;
        }

        # API with rate limiting (match with or without trailing slash)
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://life_graph_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID, X-Request-ID" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Search endpoint (tighter rate limit)
        location /api/v1/search {
            limit_req zone=search burst=5 nodelay;
            proxy_pass http://life_graph_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # MCP server (SSE — runtime DNS so nginx starts even if mcp is down)
        location /mcp/ {
            resolver 127.0.0.11 valid=10s;
            set $mcp_upstream http://mcp:8001;
            proxy_pass $mcp_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # WebSocket
        location /ws {
            proxy_pass http://life_graph_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # OpenAPI docs
        location /docs {
            proxy_pass http://life_graph_api;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://life_graph_api;
            proxy_set_header Host $host;
        }

        # Admin endpoints (restrict in production)
        location /admin/ {
            # Uncomment to restrict to specific IPs:
            # allow YOUR_IP/32;
            # deny all;
            proxy_pass http://life_graph_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Metrics (internal only)
        location /metrics {
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;
            proxy_pass http://life_graph_api;
        }
    }

    # ── HTTPS (uncomment after obtaining SSL certs) ───────────
    # server {
    #     listen 443 ssl http2;
    #     server_name YOUR_DOMAIN;
    #
    #     ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # ... copy all location blocks from above ...
    # }
}
