# Life Graph — Production Stack
# Usage: docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
# Services:
#   nginx    → Reverse proxy (port 80/443)
#   app      → Life Graph API (internal :8000)
#   worker   → ARQ background jobs
#   mcp      → MCP Server (internal :8001, proxied via /mcp/)
#   postgres → PostgreSQL + pgvector + Apache AGE
#   backup   → Nightly pg_dump + weekly restore drill (The Lifeline)
#   redis    → Cache, rate limiting, job queue
#   minio    → S3-compatible object storage

services:
  # ── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: life_graph_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Life Graph API Server ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life_graph_app
    entrypoint: ["/bin/bash", "/app/scripts/entrypoint.sh"]
    command: ["uvicorn", "life_graph.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2", "--log-level", "warning"]
    environment:
      - LIFE_GRAPH_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-life_graph}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-life_graph}
      - LIFE_GRAPH_DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-life_graph}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-life_graph}
      - LIFE_GRAPH_REDIS_URL=redis://redis:6379/0
      - LIFE_GRAPH_ENVIRONMENT=production
      - LIFE_GRAPH_LOG_FORMAT=json
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── ARQ Background Worker ────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life_graph_worker
    command: ["arq", "life_graph.workers.settings.WorkerSettings"]
    environment:
      - LIFE_GRAPH_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-life_graph}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-life_graph}
      - LIFE_GRAPH_DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-life_graph}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-life_graph}
      - LIFE_GRAPH_REDIS_URL=redis://redis:6379/0
      - LIFE_GRAPH_ENVIRONMENT=production
      - LIFE_GRAPH_LOG_FORMAT=json
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── MCP Server (Model Context Protocol) ──────────────
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life_graph_mcp
    command: ["fastmcp", "run", "life_graph/mcp_server.py", "--transport", "sse", "--port", "8001"]
    environment:
      - LIFE_GRAPH_API_URL=http://app:8000
      - LIFE_GRAPH_DEFAULT_TENANT=${LIFE_GRAPH_DEFAULT_TENANT:-personal}
    env_file:
      - .env.production
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── PostgreSQL + pgvector + Apache AGE ───────────────
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: life_graph_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-life_graph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-life_graph}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    command: >
      postgres
      -c shared_preload_libraries=age
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-life_graph}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── Backup Sidecar — "The Lifeline" (F0) ─────────────
  # Nightly pg_dump (02:00 UTC) + weekly restore-verification drill
  # (Sunday 06:00 UTC). Uses the same postgres image so pg_dump/psql
  # match the server version. Results land in the job_runs table.
  backup:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: life_graph_backup
    entrypoint: ["/bin/bash", "/scripts/backup_cron.sh"]
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-life_graph}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-life_graph}
      BACKUP_DIR: /backups
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
    volumes:
      - ./scripts:/scripts:ro
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: life_graph_redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── MinIO (S3-compatible object storage) ─────────────
  minio:
    image: minio/minio
    container_name: life_graph_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pg_data:
  minio_data:
  redis_data:
  certbot_data:
  certbot_certs:
  backup_data:
