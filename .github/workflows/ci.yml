# Life Graph CI Pipeline
#
# Jobs:
#   lint   — ruff check + format verification
#   test   — unit + integration tests against real pgvector+MinIO
#   sdk-ts — TypeScript SDK build check
#
# Triggers on push/PR to master and main branches.

name: Life Graph CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check linting
        run: ruff check life_graph/

      - name: Check formatting
        run: ruff format --check life_graph/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run unit tests
        run: python -m pytest tests/unit/ -q --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: life_graph
          POSTGRES_PASSWORD: life_graph_dev
          POSTGRES_DB: life_graph
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    env:
      LIFE_GRAPH_DATABASE_URL: postgresql+asyncpg://life_graph:life_graph_dev@localhost:5432/life_graph
      LIFE_GRAPH_DATABASE_URL_SYNC: postgresql://life_graph:life_graph_dev@localhost:5432/life_graph

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Start API server
        run: |
          python -m uvicorn life_graph.main:app --port 8000 &
          sleep 10

      - name: Run integration tests
        run: python -m pytest tests/integration/ -q --tb=short

  sdk-typescript:
    name: TypeScript SDK Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
