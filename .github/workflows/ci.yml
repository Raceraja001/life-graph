# Life Graph CI Pipeline
#
# Two jobs:
#   lint  — ruff check + format verification
#   test  — pytest against a real pgvector PostgreSQL 16 service
#
# Triggers on push/PR to master and main branches.

name: Life Graph CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check linting
        run: ruff check life_graph/

      - name: Check formatting
        run: ruff format --check life_graph/

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: life_graph
          POSTGRES_PASSWORD: life_graph
          POSTGRES_DB: life_graph
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run database migrations
        run: alembic upgrade head
        env:
          LIFE_GRAPH_DATABASE_URL: postgresql+asyncpg://life_graph:life_graph@localhost:5432/life_graph
          LIFE_GRAPH_DATABASE_URL_SYNC: postgresql://life_graph:life_graph@localhost:5432/life_graph

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          LIFE_GRAPH_DATABASE_URL: postgresql+asyncpg://life_graph:life_graph@localhost:5432/life_graph
          LIFE_GRAPH_DATABASE_URL_SYNC: postgresql://life_graph:life_graph@localhost:5432/life_graph
