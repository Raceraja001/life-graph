# Life Graph Dashboard - nginx config
# Place in /etc/nginx/sites-available/lifegraph-dashboard

upstream dashboard {
    server 127.0.0.1:3000;
}

upstream api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name dashboard.lifegraph.ai;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dashboard.lifegraph.ai;

    ssl_certificate /etc/letsencrypt/live/dashboard.lifegraph.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.lifegraph.ai/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # Dashboard (Next.js)
    location / {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy (avoid CORS by proxying through same domain)
    location /api/ {
        proxy_pass http://api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://dashboard;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # PWA assets
    location /sw.js {
        proxy_pass http://dashboard;
        add_header Cache-Control "no-cache";
    }

    location /manifest.json {
        proxy_pass http://dashboard;
        add_header Cache-Control "no-cache";
    }
}
