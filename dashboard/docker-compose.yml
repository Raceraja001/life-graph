version: '3.8'

services:
  dashboard:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: https://brain.uzhavu.co.in/api/v1
        NEXT_PUBLIC_TENANT_ID: default
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev-secret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
